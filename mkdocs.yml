site_name: BlackBox2C
site_description: Convert scikit-learn models to optimized embedded code (C, C++, Arduino, MicroPython)
site_url: https://axelskrauba.github.io/BlackBox2C
repo_url: https://github.com/AxelSkrauba/BlackBox2C
repo_name: AxelSkrauba/BlackBox2C
copyright: Copyright &copy; 2025 BlackBox2C

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.annotate
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

exclude_docs: |
  hooks.py

hooks:
  - docs/hooks.py

plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      include_source: true

nav:
  - Home: index.md
  - Getting Started: quickstart.md
  - Algorithm: algorithm.md
  - API Reference:
      - convert(): api/convert.md
      - Converter: api/converter.md
      - ConversionConfig: api/config.md
      - Exporters: api/exporters.md
      - FeatureSensitivityAnalyzer: api/analysis.md
      - CLI: api/cli.md
  - Examples: examples.md
  - Notebooks:
      - Quickstart (5 min): notebooks/01_quickstart.ipynb
      - Classification: notebooks/02_classification_iris.ipynb
      - Regression IoT: notebooks/03_regression_temperature.ipynb
      - Feature Analysis: notebooks/04_feature_analysis.ipynb
      - Multi-Format Export: notebooks/05_multi_format_export.ipynb
      - End-to-End IoT (ADL): notebooks/06_end_to_end_iot.ipynb
  - Comparison: comparison.md
  - Roadmap: roadmap.md
