site_name: BlackBox2C
site_description: Convert scikit-learn models to optimized embedded code (C, C++, Arduino, MicroPython)
site_url: https://axelskrauba.github.io/BlackBox2C
repo_url: https://github.com/AxelSkrauba/BlackBox2C
repo_name: AxelSkrauba/BlackBox2C
copyright: Copyright &copy; 2025 BlackBox2C

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.annotate
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: quickstart.md
  - Algorithm: algorithm.md
  - API Reference:
      - convert(): api/convert.md
      - Converter: api/converter.md
      - ConversionConfig: api/config.md
      - Exporters: api/exporters.md
      - FeatureSensitivityAnalyzer: api/analysis.md
      - CLI: api/cli.md
  - Examples: examples.md
  - Comparison: comparison.md
  - Roadmap: roadmap.md
